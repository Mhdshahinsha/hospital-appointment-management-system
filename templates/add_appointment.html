{% extends "base.html" %}

{% block title %}
Add Appointment
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="welcome-container">

        <h1 class="welcome-title">

            Add Appointment

        </h1>

        <p class="welcome-subtitle">

            Schedule a New Appointment

        </p>

    </div>

    <div class="d-flex justify-content-center">

        <div class="add-doctor-card">

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <form method="POST">

                <div class="row">

                    <!-- Patient -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Patient

                        </label>

                        <select
                            class="form-control"
                            name="patient_id"
                            required>

                            <option value="">

                                Select Patient

                            </option>

                            {% for patient in patients %}

                            <option value="{{ patient[0] }}">

                                {{ patient[1] }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Doctor -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Doctor

                        </label>

                        <select
                            class="form-control"
                            name="doctor_id"
                            required>

                            <option value="">

                                Select Doctor

                            </option>

                            {% for doctor in doctors %}

                            <option value="{{ doctor[0] }}">

                                {{ doctor[1] }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Appointment Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Appointment Date

                        </label>

                        <input
                            type="date"
                            class="form-control"
                            name="appointment_date"
                            required>

                    </div>

                    <!-- Appointment Time -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Appointment Time

                        </label>

                        <input
                            type="time"
                            class="form-control"
                            name="appointment_time"
                            required>

                    </div>

                    <!-- Reason -->

                    <div class="col-md-12 mb-4">

                        <label class="form-label">

                            Reason

                        </label>

                        <textarea
                            class="form-control"
                            name="reason"
                            rows="4"
                            placeholder="Enter reason for appointment"
                            required></textarea>

                    </div>

                </div>

                <div class="text-center mt-3">

                    <button
                        type="submit"
                        class="btn btn-add-login px-5">

                        <i class="bi bi-calendar-check-fill"></i>

                        Save Appointment

                    </button>

                </div>

                <div class="text-center mt-3">

                    <a href="{{ url_for('appointments') }}"
                       class="register-link">

                        ← Back to Appointments

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
