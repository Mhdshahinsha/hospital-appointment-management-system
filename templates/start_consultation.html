{% extends "base.html" %}

{% block title %}
Start Consultation
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="welcome-container">

        <h1 class="welcome-title">

            Start Consultation

        </h1>

        <p class="welcome-subtitle">

            Create Medical Record

        </p>

    </div>

    <div class="d-flex justify-content-center">

        <div class="add-doctor-card">

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <form method="POST">

                <div class="row">

                    <!-- Appointment ID -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Appointment ID

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ appointment[0] }}"
                            readonly>

                    </div>

                    <!-- Patient -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Patient Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ appointment[1] }}"
                            readonly>

                    </div>

                    <!-- Doctor -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Doctor

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ appointment[2] }}"
                            readonly>

                    </div>

                    <!-- Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Appointment Date

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ appointment[3] }}"
                            readonly>

                    </div>

                    <!-- Time -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Appointment Time

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ appointment[4] }}"
                            readonly>

                    </div>

                    <!-- Diagnosis -->

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Diagnosis

                        </label>

                        <textarea
                            class="form-control"
                            name="diagnosis"
                            rows="3"
                            placeholder="Enter Diagnosis"
                            required></textarea>

                    </div>

                    <!-- Prescription -->

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Prescription

                        </label>

                        <textarea
                            class="form-control"
                            name="prescription"
                            rows="3"
                            placeholder="Enter Prescription"
                            required></textarea>

                    </div>

                    <!-- Treatment -->

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Treatment

                        </label>

                        <textarea
                            class="form-control"
                            name="treatment"
                            rows="3"
                            placeholder="Enter Treatment"
                            required></textarea>

                    </div>

                    <!-- Doctor Notes -->

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Doctor Notes

                        </label>

                        <textarea
                            class="form-control"
                            name="doctor_notes"
                            rows="4"
                            placeholder="Additional Notes"
                            required></textarea>

                    </div>

                </div>

                <div class="text-center mt-3">

                    <button
                        type="submit"
                        class="btn btn-add-login px-5">

                        <i class="bi bi-file-earmark-medical-fill"></i>

                        Save Consultation

                    </button>

                </div>

                <div class="text-center mt-3">

                    <a href="{{ url_for('doctor_appointments') }}"
                       class="register-link">

                        ← Back to Appointments

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
