{% extends "base.html" %}

{% block title %}
Edit Appointment
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="welcome-container">

        <h1 class="welcome-title">
            Edit Appointment
        </h1>

        <p class="welcome-subtitle">
            Update Appointment Details
        </p>

    </div>

    <div class="d-flex justify-content-center">

        <div class="add-doctor-card">

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                <div class="row">

                    <!-- Patient -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Patient</label>

                        <select class="form-control"
                                name="patient_id"
                                required>

                            <option value="">Select Patient</option>

                            {% for patient in patients %}

                            <option value="{{ patient[0] }}"
                                {% if patient[0] == appointment[1] %}selected{% endif %}>

                                {{ patient[1] }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Doctor -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Doctor</label>

                        <select class="form-control"
                                name="doctor_id"
                                required>

                            <option value="">Select Doctor</option>

                            {% for doctor in doctors %}

                            <option value="{{ doctor[0] }}"
                                {% if doctor[0] == appointment[2] %}selected{% endif %}>

                                {{ doctor[1] }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Appointment Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Appointment Date
                        </label>

                        <input
                            type="date"
                            class="form-control"
                            name="appointment_date"
                            value="{{ appointment[3] }}"
                            required>

                    </div>

                    <!-- Appointment Time -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Appointment Time
                        </label>

                        <input
                            type="time"
                            class="form-control"
                            name="appointment_time"
                            value="{{ appointment[4] }}"
                            required>

                    </div>

                    <!-- Reason -->

                    <div class="col-md-12 mb-3">

                        <label class="form-label">
                            Reason
                        </label>

                        <textarea
                            class="form-control"
                            name="reason"
                            rows="4"
                            placeholder="Enter reason for appointment"
                            required>{{ appointment[5] }}</textarea>

                    </div>

                    <!-- Status -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Status
                        </label>

                        <select
                            class="form-control"
                            name="status"
                            required>

                            <option value="Pending"
                                {% if appointment[6] == "Pending" %}selected{% endif %}>
                                Pending
                            </option>

                            <option value="Confirmed"
                                {% if appointment[6] == "Confirmed" %}selected{% endif %}>
                                Confirmed
                            </option>

                            <option value="Completed"
                                {% if appointment[6] == "Completed" %}selected{% endif %}>
                                Completed
                            </option>

                            <option value="Cancelled"
                                {% if appointment[6] == "Cancelled" %}selected{% endif %}>
                                Cancelled
                            </option>

                        </select>

                    </div>

                </div>

                <div class="text-center mt-3">

                    <button
                        type="submit"
                        class="btn btn-add-login px-5">

                        <i class="bi bi-pencil-square"></i>

                        Update Appointment

                    </button>

                </div>

                <div class="text-center mt-3">

                    <a href="{{ url_for('appointments') }}"
                       class="register-link">

                        ← Back to Appointments

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
