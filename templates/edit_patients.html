{% extends "base.html" %}

{% block title %}
Edit Patient
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="welcome-container">

        <h1 class="welcome-title">
            Edit Patient
        </h1>

        <p class="welcome-subtitle">
            Update Patient Information
        </p>

    </div>

    <div class="d-flex justify-content-center">

        <div class="add-doctor-card">

            {% if error %}

            <div class="alert alert-danger">
                {{ error }}
            </div>

            {% endif %}

            <form method="POST">

                <div class="row">

                    <!-- Full Name -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Full Name</label>

                        <input
                            type="text"
                            class="form-control"
                            name="full_name"
                            value="{{ patient[1] }}"
                            required>

                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email</label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            value="{{ patient[4] }}"
                            readonly>

                    </div>

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Phone Number</label>

                        <input
                            type="text"
                            class="form-control"
                            name="phone"
                            value="{{ patient[5] }}"
                            required>

                    </div>

                    <!-- Age -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Age</label>

                        <input
                            type="number"
                            class="form-control"
                            name="age"
                            value="{{ patient[2] }}"
                            required>

                    </div>

                    <!-- Gender -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Gender</label>

                        <select
                            class="form-control"
                            name="gender"
                            required>

                            <option value="Male"
                                {% if patient[3] == "Male" %}selected{% endif %}>
                                Male
                            </option>

                            <option value="Female"
                                {% if patient[3] == "Female" %}selected{% endif %}>
                                Female
                            </option>

                            <option value="Other"
                                {% if patient[3] == "Other" %}selected{% endif %}>
                                Other
                            </option>

                        </select>

                    </div>

                    <!-- Address -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Address</label>

                        <textarea
                            class="form-control"
                            name="address"
                            rows="3"
                            required>{{ patient[6] }}</textarea>

                    </div>

                </div>

                <div class="text-center mt-3">

                    <button
                        type="submit"
                        class="btn btn-add-login px-5">

                        <i class="bi bi-pencil-square"></i>

                        Update Patient

                    </button>

                </div>

                <div class="text-center mt-3">

                    <a href="{{ url_for('patients') }}"
                       class="register-link">

                        ← Back to Patients

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
