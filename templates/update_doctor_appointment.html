{% extends "base.html" %}

{% block title %}
Update Appointment
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="welcome-container">

<h1 class="welcome-title">

Update Appointment

</h1>

<p class="welcome-subtitle">

Doctor Appointment Status

</p>

</div>

<div class="d-flex justify-content-center">

<div class="add-doctor-card">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Appointment ID

</label>

<input
class="form-control"
value="{{ appointment[0] }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Date

</label>

<input
class="form-control"
value="{{ appointment[1] }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Time

</label>

<input
class="form-control"
value="{{ appointment[2] }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Status

</label>

<select
name="status"
class="form-control">

<option
value="Pending"
{% if appointment[3]=="Pending" %}
selected
{% endif %}>
Pending
</option>

<option
value="Confirmed"
{% if appointment[3]=="Confirmed" %}
selected
{% endif %}>
Confirmed
</option>

<option
value="Completed"
{% if appointment[3]=="Completed" %}
selected
{% endif %}>
Completed
</option>

<option
value="Cancelled"
{% if appointment[3]=="Cancelled" %}
selected
{% endif %}>
Cancelled
</option>

</select>

</div>

</div>

<div class="text-center">

<button
class="btn btn-add-login">

<i class="bi bi-pencil-square"></i>

Update Status

</button>

</div>

<div class="text-center mt-3">

<a
href="{{ url_for('doctor_appointments') }}"
class="register-link">

← Back

</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
